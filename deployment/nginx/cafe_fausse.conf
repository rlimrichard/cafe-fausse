# Copy to /etc/nginx/conf.d/cafe_fausse.conf and replace example.com before reloading Nginx.
server {
    listen 80;
    server_name example.com www.example.com;

    root /opt/cafe_fausse/frontend/dist;
    index index.html;

    # Compress text responses when the client advertises gzip support.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Keep API responses (including unversioned uploaded menu images) under Flask's control.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite hashes compiled assets, making them safe to cache for a year.
    location ~* \.(?:css|js|mjs|woff2?|ttf|otf|svg|png|jpe?g|gif|webp|avif|ico)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Do not cache the HTML shell so a new deployment references the newest asset hashes.
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # React client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
